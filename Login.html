<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroNotify - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#f0fdf4,#dcfce7);
}

.container{
  background:#fff;
  width:100%;
  max-width:420px;
  padding:40px 30px;
  border-radius:18px;
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.logo{
  text-align:center;
  margin-bottom:25px;
}

.logo span{
  font-size:40px;
}

.logo h1{
  font-size:26px;
  color:#166534;
  margin-top:10px;
}

.title{
  text-align:center;
  margin-bottom:25px;
  font-size:20px;
  font-weight:600;
  color:#14532d;
}

.form-group{
  margin-bottom:18px;
}

label{
  display:block;
  font-size:14px;
  margin-bottom:6px;
  color:#374151;
}

input{
  width:100%;
  padding:12px;
  border:1px solid #d1d5db;
  border-radius:8px;
  font-size:14px;
  transition:0.3s;
}

input:focus{
  border-color:#16a34a;
  outline:none;
}

.error{
  color:red;
  font-size:12px;
  display:none;
  margin-top:5px;
}

button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:10px;
  background:#16a34a;
  color:#fff;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
  margin-top:10px;
}

button:hover{
  background:#15803d;
}

.bottom-text{
  text-align:center;
  margin-top:20px;
  font-size:14px;
}

.bottom-text a{
  color:#16a34a;
  text-decoration:none;
  font-weight:600;
}

.bottom-text a:hover{
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <span>🌱</span>
    <h1>AgroNotify</h1>
  </div>

  <div class="title">Login to Your Account</div>

  <form id="loginForm">

    <div class="form-group">
      <label>Email or Mobile</label>
      <input type="text" id="identifier" name="email or mobile" placeholder="Enter email or mobile">
      <div class="error" id="emailError">Please enter your email or mobile</div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password">
      <div class="error" id="passwordError">Please enter your password</div>
    </div>

    <button type="submit">Login</button>

  </form>

  <div class="bottom-text">
    Don't have an account?
    <a href="Registration.html">Register</a>
  </div>

</div>

<script src="Login.js">
const form = document.getElementById("loginForm");
const email = document.getElementById("email");
const password = document.getElementById("password");

const emailError = document.getElementById("emailError");
const passwordError = document.getElementById("passwordError");

form.addEventListener("submit", function(e){
  e.preventDefault();

  let valid = true;

  if(email.value.trim() === ""){
    emailError.style.display = "block";
    valid = false;
  } else {
    emailError.style.display = "none";
  }

  if(password.value.trim() === ""){
    passwordError.style.display = "block";
    valid = false;
  } else {
    passwordError.style.display = "none";
  }

  if(valid){
     window.location.href = "Dashboard.html";
  }
});
</script>

</body>
</html>
